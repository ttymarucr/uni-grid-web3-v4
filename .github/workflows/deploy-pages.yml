name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build site
        run: yarn build
        env:
          VITE_GRIDHOOK_ADDRESS_UNICHAIN: ${{ vars.VITE_GRIDHOOK_ADDRESS_UNICHAIN }}
          VITE_SWAP_ROUTER_ADDRESS_UNICHAIN: ${{ vars.VITE_SWAP_ROUTER_ADDRESS_UNICHAIN }}
          VITE_RPC_URL_UNICHAIN: ${{ secrets.VITE_RPC_URL_UNICHAIN }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          BASE_PATH: ${{ vars.BASE_PATH }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4